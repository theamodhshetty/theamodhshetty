<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nature and code hero scene dark</title>
  <desc id="desc">Night landscape with mountains, trees, and a floating code panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06111c"/>
      <stop offset="58%" stop-color="#10253a"/>
      <stop offset="100%" stop-color="#153e31"/>
    </linearGradient>
    <linearGradient id="hillBack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#1f4f46"/>
    </linearGradient>
    <linearGradient id="hillFront" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#123327"/>
      <stop offset="100%" stop-color="#1b5e4a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f01f"/>
      <stop offset="100%" stop-color="#22c55e24"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>

  <g opacity="0.45" stroke="#dbeafe" stroke-width="1">
    <path d="M0 335H1600"/>
    <path d="M0 300H1600"/>
    <path d="M0 265H1600"/>
    <path d="M0 230H1600"/>
    <path d="M200 0V420"/>
    <path d="M400 0V420"/>
    <path d="M600 0V420"/>
    <path d="M800 0V420"/>
    <path d="M1000 0V420"/>
    <path d="M1200 0V420"/>
    <path d="M1400 0V420"/>
  </g>

  <circle cx="1320" cy="76" r="34" fill="#f8fafc" opacity="0.92"/>
  <circle cx="1320" cy="76" r="56" fill="#dbeafe" opacity="0.13"/>

  <path d="M0 265C180 235 330 292 470 258C620 223 748 168 916 196C1093 226 1286 290 1600 238V420H0V265Z" fill="url(#hillBack)"/>
  <path d="M0 298C176 261 360 331 558 296C744 264 931 219 1129 246C1302 269 1457 331 1600 320V420H0V298Z" fill="url(#hillFront)"/>

  <g opacity="0.8" fill="#0f2b22">
    <path d="M110 320L131 258L152 320Z"/>
    <path d="M150 320L170 248L190 320Z"/>
    <path d="M1490 324L1512 250L1534 324Z"/>
    <path d="M1454 324L1472 262L1490 324Z"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="86" rx="16" ry="16" width="720" height="222" fill="url(#glass)" stroke="#93c5fd55"/>
    <rect x="640" y="86" width="720" height="34" rx="16" ry="16" fill="#0f172a9c"/>
    <circle cx="664" cy="103" r="4.5" fill="#f87171"/>
    <circle cx="681" cy="103" r="4.5" fill="#fbbf24"/>
    <circle cx="698" cy="103" r="4.5" fill="#34d399"/>

    <text x="668" y="151" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#cbd5e1">const craft = ["nature", "code", "shipping"];</text>
    <text x="668" y="181" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#93c5fd">if (focus === "product") build("fast", "clean", "mobile");</text>
    <text x="668" y="211" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#86efac">while (curious) learn(["SwiftUI", "Kotlin", "Next.js"]);</text>
    <rect x="668" y="238" width="520" height="3" fill="url(#line)" opacity="0.88"/>
    <text x="668" y="270" font-family="Menlo, Monaco, Consolas, monospace" font-size="16" fill="#e2e8f0">// building calm UIs with high-signal engineering</text>
  </g>

  <text x="84" y="122" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#f8fafc">Amodh Shetty</text>
  <text x="84" y="158" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#bfdbfe">Nature + Code | Web and Mobile Builder</text>
</svg>
